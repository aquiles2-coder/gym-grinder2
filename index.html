<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Grinder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game">
<header>
  <h1>🏋️ Gym Grinder</h1>
  <div id="user-info" class="stats"></div>
  <div id="stats" class="stats">Level: 1 | XP: 0/100 | Strength: 10</div>
  <button id="logout-btn" style="display: none;">Logout</button>  <!-- new line -->
</header>

    <div id="auth-section">
      <button id="login-btn">Login</button>
      <button id="register-btn">Register</button>
    </div>

    <div id="pending-section" style="display: none;" class="stats">
      <h2>⏳ Waiting for Admin Approval</h2>
      <p>Your account has been created but is not yet approved.<br>
      Please wait until an admin activates your account.</p>
    </div>

    <div id="main-game" style="display: none;">

    <div id="main-game" style="display: none;">
      <section id="workout">
        <h2>Log Workout</h2>
        <select id="exercise-select"></select><br><br>
        <input type="number" id="weight" placeholder="Weight (kg)" step="0.5">
        <input type="number" id="reps" placeholder="Reps" min="1">
        <button id="confirm-btn">CONFIRM SET 💪</button>
        <p id="log-message"></p>
      </section>

      <section id="leaderboards">
        <h2>Leaderboards</h2>
        <div id="global-lb" class="stats"></div>
      </section>
    </div>
  </div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <script src="firebase-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
